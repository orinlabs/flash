# Blueprint: provision lowest-cost API + Postgres under the Orin Labs workspace.
# Create in dashboard: Orin Labs → New → Blueprint → connect this repo.
#
# Note: Render Workflows are NOT created by Blueprint yet (Render limitation).
# After this deploys, add a Workflow service in the same project (see PLAN.md).

databases:
  - name: icp-prospector-db
    plan: free
    region: oregon
    databaseName: icp_prospector

services:
  - type: web
    name: icp-prospector-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: yarn install && yarn build
    startCommand: yarn start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: icp-prospector-db
          property: connectionString
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_WORKFLOW_SLUG
        sync: false

  - type: web
    name: icp-prospector-web
    runtime: static
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
