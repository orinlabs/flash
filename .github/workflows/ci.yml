name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: |
          npm install -g yarn@1.22.22
          yarn install --frozen-lockfile

      - name: Typecheck and build API
        run: yarn typecheck && yarn build

      - name: Build frontend
        run: |
          cd frontend
          yarn install --frozen-lockfile
          yarn build
